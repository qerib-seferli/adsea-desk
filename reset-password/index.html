<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADSEA Desk - Şifrə bərpası</title>
  <meta name="theme-color" content="#0891b2" />
  <link rel="icon" href="../foto/Logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../assets/css/theme.css" />
</head>

<body class="auth-body">
  <main class="auth-card">
    <img src="../foto/Logo.png" class="auth-logo" alt="ADSEA" />
    <h1>Şifrəni yenilə</h1>
    <p>E-poçt ünvanınıza bərpa linki göndəriləcək</p>

    <form id="reset-form" class="auth-form">
      <label>Korporativ e-poçt</label>
      <input id="reset-email" type="email" required placeholder="ad.soyad@adsea.gov.az" />
      <button type="submit">Bərpa linki göndər</button>
    </form>

    <div class="auth-links">
      <a href="../login/">Giriş səhifəsinə qayıt</a>
    </div>
  </main>

  <div id="toast-root"></div>

  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
