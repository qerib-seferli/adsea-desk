<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSEA Desk - Uzaqdan İdarəetmə Paneli</title>
    <!-- Tailwind CSS (PRO Neon və Dark Mode stilləri üçün) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide İkonları üçün FontAwesome / Tailwind elementləri -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Glassmorphism və Neon Effektləri */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-border-cyan:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        .neon-glow-blue {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-cyan-500 selection:text-slate-950">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Bütün UI bura yüklənəcək -->
    </div>

    <!-- Əsas Məntiq Faylı -->
    <script src="app.js"></script>
</body>
</html>
