<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSEA Desk - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="glass-panel max-w-md w-full rounded-2xl p-8 border-cyan-500/10 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-xl bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center mx-auto shadow-lg shadow-blue-500/20 mb-3">
                <i class="fa-solid fa-lock-open text-white text-xl"></i>
            </div>
            <h2 class="text-lg font-bold tracking-wide">ADSEA DESK</h2>
            <p class="text-xs text-slate-400 mt-1">Uzaqdan İdarəetmə və Şəbəkə Portalı</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5 pl-1">Korporativ E-poçt</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-xs text-slate-500"></i>
                    <input type="email" id="login-email" required placeholder="ad.soyad@adsea.gov.az" 
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl py-2.5 pl-9 pr-4 text-xs text-slate-200 placeholder-slate-700 outline-none neon-border-cyan transition">
                </div>
            </div>

            <div>
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5 pl-1">Şifrə</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-3 top-3.5 text-xs text-slate-500"></i>
                    <input type="password" id="login-password" required placeholder="••••••••" 
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl py-2.5 pl-9 pr-4 text-xs text-slate-200 placeholder-slate-700 outline-none neon-border-cyan transition">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-semibold py-3 px-4 rounded-xl transition flex items-center justify-center space-x-2 text-xs shadow-md shadow-blue-600/10 pt-3">
                <i class="fa-solid fa-right-to-bracket text-[11px]"></i> <span>Sistemə Daxil Ol</span>
            </button>
        </form>

        <div class="mt-6 border-t border-slate-900 pt-4 text-center space-y-2">
            <p class="text-xs text-slate-500">
                Şifrənizi unutmusunuz? 
                <a href="reset-password" class="text-amber-400 hover:underline font-medium">Şifrəni yeniləyin</a>
            </p>
            <p class="text-xs text-slate-500">
                Sistemdə hesabınız yoxdur? 
                <a href="register" class="text-cyan-400 hover:underline font-medium">Qeydiyyatdan keçin</a>
            </p>
        </div>
        
    </div>

    <div id="alert-container" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <script src="supabase.js"></script>
    <script src="admin.js"></script>
    <script src="user.js"></script>
    <script>
        if (window.location.pathname.endsWith('.html')) {
            window.history.replaceState(null, '', window.location.pathname.replace(/\.html$/, ''));
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            AdminMühərriki.mesajGöstər("Kimlik yoxlanılır...", "info");
            
            // user.js daxilindəki daxilolma funksiyasını çağıracağıq (Növbəti addımda Supabase qoşulacaq)
            setTimeout(() => {
                // Keçici simulyasiya: Əgər admin tərəfindən təsdiqlənibsə ana səhifəyə yönləndirir
                window.location.href = "index";
            }, 1000);
        });
    </script>
</body>
</html>
