name: Build ADSEA Desk Agent

on:
  workflow_dispatch:
  push:
    paths:
      - "agent/app/**"
      - ".github/workflows/build-agent.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: agent/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build ADSEA Desk
        run: npm run tauri build

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: ADSEA-Desk-Windows
          path: |
            agent/app/src-tauri/target/release/bundle/nsis/*.exe
            agent/app/src-tauri/target/release/*.exe
