<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSEA Desk - Şifrənin Yenilənməsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="glass-panel max-w-md w-full rounded-2xl p-8 border-cyan-500/10 shadow-2xl relative">
        <div class="text-center mb-6">
            <div class="w-14 h-14 rounded-xl bg-gradient-to-tr from-amber-600 to-yellow-500 flex items-center justify-center mx-auto shadow-lg shadow-amber-500/20 mb-3">
                <i class="fa-solid fa-key text-white text-xl"></i>
            </div>
            <h2 class="text-lg font-bold tracking-wide">Şifrəni Yenilə</h2>
            <p class="text-xs text-slate-400 mt-1">E-poçt ünvanınıza şifrə sıfırlama linki göndəriləcəkdir</p>
        </div>

        <form id="reset-form" class="space-y-4">
            <div>
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5 pl-1">Korporativ E-poçt</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-xs text-slate-500"></i>
                    <input type="email" id="reset-email" required placeholder="ad.soyad@adsea.gov.az" 
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl py-2.5 pl-9 pr-4 text-xs text-slate-200 placeholder-slate-700 outline-none neon-border-cyan transition">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-yellow-600 hover:from-amber-500 hover:to-yellow-500 text-white font-semibold py-3 px-4 rounded-xl transition flex items-center justify-center space-x-2 text-xs shadow-md">
                <i class="fa-solid fa-paper-plane text-[11px]"></i> <span>Bərpa Linki Göndər</span>
            </button>
        </form>

        <div class="mt-6 border-t border-slate-900 pt-4 text-center">
            <p class="text-xs text-slate-500"><a href="login" class="text-cyan-400 hover:underline font-medium">Giriş pəncərəsinə qayıt</a></p>
        </div>
    </div>

    <div id="alert-container" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <script src="supabase.js"></script>
    <script src="admin.js"></script>
    <script>
        if (window.location.pathname.endsWith('.html')) {
            window.history.replaceState(null, '', window.location.pathname.replace(/\.html$/, ''));
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            AdminMühərriki.mesajGöstər("Sorğu göndərilir...", "info");

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password',
            });

            if (error) {
                AdminMühərriki.mesajGöstər(error.message, "error");
            } else {
                AdminMühərriki.mesajGöstər("Şifrə sıfırlama təlimatları e-poçtunuza göndərildi.", "success");
            }
        });
    </script>
</body>
</html>
